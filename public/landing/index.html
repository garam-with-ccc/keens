<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Keens Song Camp</title>
  <meta name="description" content="The operating system for songwriting camps." />
  <style>
    :root { color-scheme: dark; }
    * { box-sizing: border-box; }
    html, body { margin: 0; padding: 0; height: 100%; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      background: #0a0a0a;
      color: #fafafa;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 1.5rem;
    }
    main { max-width: 36rem; text-align: center; }
    .kicker {
      font-size: 0.75rem;
      letter-spacing: 0.3em;
      text-transform: uppercase;
      color: #a3a3a3;
      margin-bottom: 1.5rem;
    }
    h1 {
      font-size: clamp(2.5rem, 6vw, 3.75rem);
      font-weight: 600;
      letter-spacing: -0.02em;
      margin: 0 0 1.5rem;
    }
    p.lead {
      font-size: 1.125rem;
      line-height: 1.6;
      color: #d4d4d4;
      margin: 0;
    }
    .footnote {
      margin-top: 3rem;
      font-size: 0.75rem;
      color: #737373;
    }
  </style>
</head>
<body>
  <main>
    <p class="kicker">Keens</p>
    <h1>Keens Song Camp</h1>
    <p class="lead">
      The operating system for songwriting camps. Run the camp,
      capture the songs, lock the splits before everyone leaves the room.
    </p>
    <p class="footnote">Pre-product. Building in public &middot; v0</p>
  </main>
</body>
</html>
