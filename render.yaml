databases:
  - name: keens-postgres
    plan: free
    databaseName: keens_production
    user: keens

services:
  - type: web
    name: keens-web
    runtime: ruby
    plan: free
    region: oregon
    branch: main
    autoDeploy: true
    healthCheckPath: /up
    buildCommand: "./bin/render-build.sh"
    startCommand: "./bin/render-start.sh"
    envVars:
      - key: RAILS_ENV
        value: production
      - key: RAILS_MASTER_KEY
        sync: false
      - key: DATABASE_URL
        fromDatabase:
          name: keens-postgres
          property: connectionString
      - key: WEB_CONCURRENCY
        value: 2
      - key: RAILS_MAX_THREADS
        value: 3
      - key: RAILS_LOG_TO_STDOUT
        value: true
      - key: RAILS_SERVE_STATIC_FILES
        value: true
      # Mail delivery (set in Render dashboard, not synced from repo)
      - key: APP_HOST
        sync: false
      - key: MAIL_FROM
        sync: false
      - key: SMTP_ADDRESS
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USERNAME
        sync: false
      - key: SMTP_PASSWORD
        sync: false
      - key: SMTP_AUTHENTICATION
        sync: false
